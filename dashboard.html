<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据仪表板</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">🏠 上海二手房数据分析系统</h1>
            <ul class="nav-links">
                <li><a href="/">首页</a></li>
                <li><a href="/dashboard">数据仪表板</a></li>
            </ul>
        </div>
    </nav>

    <div class="container dashboard">
        <h2>📊 数据仪表板</h2>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <h4>总房源数</h4>
                <p class="stat-value" id="total-records">--</p>
            </div>
            <div class="stat-card">
                <h4>行政区数</h4>
                <p class="stat-value" id="total-districts">--</p>
            </div>
            <div class="stat-card">
                <h4>平均总价</h4>
                <p class="stat-value" id="avg-price">--</p>
            </div>
            <div class="stat-card">
                <h4>平均单价</h4>
                <p class="stat-value" id="avg-unit-price">--</p>
            </div>
        </div>

        <!-- 图表容器 -->
        <div class="charts-container">
            <div class="chart-box">
                <h3>行政区房源数量分布</h3>
                <iframe id="chart-district-count" src="/api/charts/district_count" style="width:100%; height:400px; border:none;"></iframe>
            </div>

            <div class="chart-box">
                <h3>行政区平均总价</h3>
                <iframe id="chart-avg-price" src="/api/charts/district_avg_price" style="width:100%; height:400px; border:none;"></iframe>
            </div>

            <div class="chart-box">
                <h3>行政区平均单价</h3>
                <iframe id="chart-unit-price" src="/api/charts/district_unit_price" style="width:100%; height:400px; border:none;"></iframe>
            </div>

            <div class="chart-box">
                <h3>房屋朝向分布</h3>
                <iframe id="chart-orientation" src="/api/charts/orientation" style="width:100%; height:400px; border:none;"></iframe>
            </div>

            <div class="chart-box">
                <h3>建筑时间分布</h3>
                <iframe id="chart-building-year" src="/api/charts/building_year" style="width:100%; height:400px; border:none;"></iframe>
            </div>

            <div class="chart-box">
                <h3>面积与价格关系</h3>
                <iframe id="chart-price-vs-area" src="/api/charts/price_vs_area" style="width:100%; height:400px; border:none;"></iframe>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="table-container">
            <h3>行政区统计数据</h3>
            <table id="district-table">
                <thead>
                    <tr id="table-header"></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 郑州升达经贸管理学院 毕业设计项目</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
